kind = "web"
previewPath = "/"
title = "Blacksof — Selected Work"
version = "1.0.0"
id = "artifacts/blacksof"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25363

[services.development]
run = "pnpm --filter @workspace/blacksof run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blacksof", "run", "build" ]
publicDir = "artifacts/blacksof/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25363"
BASE_PATH = "/"
